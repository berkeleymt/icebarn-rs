# EXAMPLE Secret template for icebarn-rs — DO NOT commit real secrets.
#
# Replace the PLACEHOLDER values and apply, OR (preferred) create the Secret
# out-of-band so secrets never live in git, e.g.:
#
#   kubectl create secret generic icebarn-rs-secrets \
#     --from-literal=POSTGRES_URI='postgres://USER:PASS@HOST:5432/DB' \
#     --from-literal=OIDC_CLIENT_SECRET='...' \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)"
#
apiVersion: v1
kind: Secret
metadata:
  name: icebarn-rs-secrets
  labels:
    app.kubernetes.io/name: icebarn-rs
type: Opaque
stringData:
  # Postgres connection string. REQUIRED — the app .unwrap()s this and panics if
  # unset. The app auto-creates its `rooms` table on boot.
  POSTGRES_URI: "postgres://USER:PASSWORD@PLACEHOLDER_DB_HOST:5432/icebarn"

  # ContestDojo OAuth client secret (PR #4).
  OIDC_CLIENT_SECRET: "PLACEHOLDER_OIDC_CLIENT_SECRET"

  # Signs the session cookie (HMAC). MUST be a fixed, stable value shared
  # IDENTICALLY across all replicas, or sessions are rejected across pods and
  # restarts. Generate once with: openssl rand -hex 32
  SESSION_SECRET: "PLACEHOLDER_SESSION_SECRET_openssl_rand_hex_32"
