apiVersion: apps/v1
kind: Deployment
metadata:
  name: icebarn-rs
  labels:
    app.kubernetes.io/name: icebarn-rs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icebarn-rs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: icebarn-rs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: icebarn-rs
          # PLACEHOLDER: replace with your pushed image, e.g.
          # registry.example.com/icebarn-rs:<tag>
          image: PLACEHOLDER_REGISTRY/icebarn-rs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: icebarn-rs-config
            - secretRef:
                name: icebarn-rs-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
